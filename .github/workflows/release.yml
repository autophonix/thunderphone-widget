name: Release

on:
  push:
    branches: [main, beta]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

env:
  AZURE_STORAGE_ACCOUNT: stthunderphoneprod

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID_PRODUCTION }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID_PRODUCTION }}

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

      - name: Publish to npm
        if: hashFiles('.release-version') != ''
        run: |
          CHANNEL=$(cat .release-channel)
          if [ -n "$CHANNEL" ]; then
            npm publish --access public --provenance --tag "$CHANNEL"
          else
            npm publish --access public --provenance
          fi

      - name: Upload to CDN
        if: hashFiles('.release-version') != ''
        run: |
          VERSION=$(cat .release-version)

          if echo "$VERSION" | grep -q "-"; then
            # Pre-release (beta) — only update beta/ alias
            az storage blob upload \
              --account-name "$AZURE_STORAGE_ACCOUNT" \
              --auth-mode login \
              --container-name '$web' \
              --name widget/beta/widget.js \
              --file dist/mount.global.js \
              --content-type application/javascript \
              --content-cache-control "public, max-age=300" \
              --overwrite

            az storage blob upload \
              --account-name "$AZURE_STORAGE_ACCOUNT" \
              --auth-mode login \
              --container-name '$web' \
              --name widget/beta/style.css \
              --file dist/mount.css \
              --content-type text/css \
              --content-cache-control "public, max-age=300" \
              --overwrite
          else
            # Stable release — upload versioned + latest
            az storage blob upload \
              --account-name "$AZURE_STORAGE_ACCOUNT" \
              --auth-mode login \
              --container-name '$web' \
              --name "widget/v${VERSION}/widget.js" \
              --file dist/mount.global.js \
              --content-type application/javascript \
              --content-cache-control "public, max-age=31536000, immutable" \
              --overwrite

            az storage blob upload \
              --account-name "$AZURE_STORAGE_ACCOUNT" \
              --auth-mode login \
              --container-name '$web' \
              --name "widget/v${VERSION}/style.css" \
              --file dist/mount.css \
              --content-type text/css \
              --content-cache-control "public, max-age=31536000, immutable" \
              --overwrite

            az storage blob upload \
              --account-name "$AZURE_STORAGE_ACCOUNT" \
              --auth-mode login \
              --container-name '$web' \
              --name widget/latest/widget.js \
              --file dist/mount.global.js \
              --content-type application/javascript \
              --content-cache-control "public, max-age=300" \
              --overwrite

            az storage blob upload \
              --account-name "$AZURE_STORAGE_ACCOUNT" \
              --auth-mode login \
              --container-name '$web' \
              --name widget/latest/style.css \
              --file dist/mount.css \
              --content-type text/css \
              --content-cache-control "public, max-age=300" \
              --overwrite
          fi

      # Upload shared assets (ringtone, etc.) — stable path, long cache.
      # These live outside the versioned directories so all widget versions
      # can reference the same URL.
      - name: Upload assets to CDN
        run: |
          if [ -d assets ]; then
            az storage blob upload-batch \
              --account-name "$AZURE_STORAGE_ACCOUNT" \
              --auth-mode login \
              --destination '$web' \
              --destination-path widget/assets \
              --source assets \
              --content-cache-control "public, max-age=31536000, immutable" \
              --overwrite
          fi
